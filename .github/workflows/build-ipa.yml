name: Build iOS Dev Client

on:
  workflow_dispatch:
  push:
    tags:
      - 'ipa-v*.*.*'
      - 'v*.*.*'
    paths-ignore:
      - 'README.md'
      - 'wiki/**'
      - 'public/**'
      - 'scripts/**'
      - '.vscode'
      - '.idea'

jobs:
  build-ios:
    name: Build iOS Simulator app (debug)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build tw plugins & scripts
        run: |
          pnpm run build:plugin
          pnpm run build:tw-assets

      - name: Install expo-dev-client
        run: pnpm install expo-dev-client -w

      - name: Modify app.json for dev-client
        run: |
          node -e "
          const fs = require('fs');
          const appJson = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          appJson.expo.name = 'TidGi Test';
          appJson.expo.ios.bundleIdentifier = 'ren.onetwo.tidgi.mobile.test';
          fs.writeFileSync('app.json', JSON.stringify(appJson, null, 2));
          "

      - name: Expo prebuild (iOS)
        run: pnpm exec expo prebuild -p ios --clean

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update

      - uses: actions/cache@v4
        name: Cache CocoaPods
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Build iOS Simulator app (debug, no signing)
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/.xcworkspace//')
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            -quiet

      - name: Package .app into artifact
        run: |
          mkdir -p /tmp/ios-artifacts
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            cd "$(dirname "$APP_PATH")"
            zip -r /tmp/ios-artifacts/TidGi-Test-Simulator.zip "$(basename "$APP_PATH")"
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app-${{ github.run_number }}-${{ github.sha }}
          path: /tmp/ios-artifacts/
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          generate_release_notes: false
          files: /tmp/ios-artifacts/TidGi-Test-Simulator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
